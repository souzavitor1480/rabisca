<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabisca | Deletar conta</title>
    <link rel="icon" href="imagens/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/principal.css">
    <link rel="stylesheet" href="css/conteudos-principais.css">
    <link rel="stylesheet" href="css/formularios.css">
    <link rel="stylesheet" href="css/campos-pergunta-seguranca.css">
    <link rel="stylesheet" href="css/botoes-principais.css">
    <link rel="stylesheet" href="css/modais.css">
    <link rel="stylesheet" href="css/botoes-perigo.css">
    <link rel="stylesheet" href="css/botoes-fechar-modais-alerta.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="javascript/principal.js"></script>
    <script type="module" src="javascript/fechamento-modal-alerta.js"></script>
    <script type="module" src="javascript/verificacao-sessao-expirou.js"></script>
    <script type="module" src="javascript/logout.js"></script>
    <script type="module" src="javascript/delecao-usuario.js"></script>
</head>

<body>
    <header class="cabecalho">
        <div class="container-logo">
            <img src="imagens/logo.svg" alt="Logo do Rabisca">
            <h1>Rabisca</h1>
        </div>
        <div class="container-barra-navegacao">
            <button type="button" id="botao-alternar-barra-navegacao" class="botao-alternar-barra-navegacao">
                <i id="icone-alternar-barra-navegacao" class="bi bi-list"></i>
            </button>
            <nav id="barra-navegacao" class="barra-navegacao">
                <a href="painel.html" class="link-barra-navegacao">
                    <i class="bi bi-speedometer"></i> Painel
                </a>
                <a href="cadastro-nota.html" class="link-barra-navegacao">
                    <i class="bi bi-plus-square"></i> Cadastrar nota
                </a>
                <a href="consulta-notas.html" class="link-barra-navegacao">
                    <i class="bi bi-search"></i> Consultar notas
                </a>
                <a href="edicao-usuario.html" class="link-barra-navegacao">
                    <i class="bi bi-pencil-square"></i> Editar dados
                </a>
                <a href="delecao-usuario.html" class="link-barra-navegacao">
                    <i class="bi bi-trash"></i> Deletar conta
                </a>
                <a href="javascript:void(0)" id="link-logout" class="link-barra-navegacao">
                    <i class="bi bi-box-arrow-in-left"></i> Sair
                </a>
            </nav>
        </div>
    </header>
    <main class="conteudo-principal">
        <h2>
            Deletar conta <i class="bi bi-trash"></i>
        </h2>
        <form id="formulario" class="formulario" novalidate>
            <label for="campo-pergunta-seguranca" class="label">
                Pergunta de segurança: <span class="obrigatorio">*</span>
            </label>
            <select name="pergunta-seguranca" id="campo-pergunta-seguranca" class="campo campo-pergunta-seguranca"
                required>
                <option value="">Selecione uma opção</option>
                <option value="0">Qual era o nome do seu primeiro animal de estimação?</option>
                <option value="1">Qual era o nome do seu primeiro professor?</option>
                <option value="2">Qual era o nome do seu brinquedo favorito na infância?</option>
            </select>
            <label for="campo-resposta" class="label">
                Resposta: <span class="obrigatorio">*</span>
            </label>
            <input type="text" name="resposta" id="campo-resposta" class="campo" placeholder="Digite sua resposta"
                maxlength="40" required>
            <button type="submit" class="botao botao-principal botao-formulario">
                Deletar conta <i class="bi bi-trash"></i>
            </button>
        </form>
    </main>
    <div class="ferramentas-acessibilidade">
        <button type="button" id="botao-alternar-container-botoes-acessibilidade"
            class="botao botao-sucesso botao-acessibilidade">
            <i class="bi bi-universal-access"></i>
        </button>
        <div id="container-botoes-acessibilidade" class="container-botoes-acessibilidade">
            <button type="button" id="botao-aumentar-fonte" class="botao botao-sucesso botao-acessibilidade">A+</button>
            <button type="button" id="botao-diminuir-fonte" class="botao botao-sucesso botao-acessibilidade">A-</button>
            <button type="button" id="botao-redefinir-fonte" class="botao botao-sucesso botao-acessibilidade">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>
        </div>
    </div>
    <div id="fundo-modal-alerta" class="fundo-modal"></div>
    <div id="modal-alerta" class="modal">
        <h3 class="titulo-modal">
            Atenção <i class="bi bi-exclamation-triangle"></i>
        </h3>
        <p id="texto-modal-alerta" class="texto-modal"></p>
        <button type="button" id="botao-fechar-modal-alerta"
            class="botao botao-perigo botao-modal botao-fechar-modal-alerta">
            Fechar <i class="bi bi-x-square"></i>
        </button>
    </div>
    <footer class="rodape">
        <p class="creditos">
            <i class="bi bi-c-circle"></i>
            <span id="container-ano-atual">2025</span> Rabisca - Todos os direitos reservados.
        </p>
    </footer>
</body>

</html>
