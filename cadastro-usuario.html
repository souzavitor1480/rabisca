<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crie sua conta no Rabisca e comece a anotar ideias, pensamentos e tarefas em um só lugar. Cadastro rápido, simples e gratuito para organizar tudo o que importa.">
    <meta name="keywords" content="cadastro Rabisca, criar conta, registro de usuário, site de anotações, app de anotações, organizar ideias, anotações online, notas pessoais, produtividade, escrever ideias, plataforma de notas, criar conta gratuita">
    <title>Rabisca | Criar conta</title>
    <link rel="icon" href="imagens/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/principal.css">
    <link rel="stylesheet" href="css/componentes/conteudos-principais.css">
    <link rel="stylesheet" href="css/componentes/formularios.css">
    <link rel="stylesheet" href="css/componentes/areas-campos-senha.css">
    <link rel="stylesheet" href="css/componentes/campos-pergunta-seguranca.css">
    <link rel="stylesheet" href="css/componentes/botoes-principais.css">
    <link rel="stylesheet" href="css/componentes/textos-alternar-formularios.css">
    <link rel="stylesheet" href="css/componentes/links.css">
    <link rel="stylesheet" href="css/componentes/modais.css">
    <link rel="stylesheet" href="css/componentes/botoes-perigo.css">
    <link rel="stylesheet" href="css/componentes/botoes-fechar-modais-alerta.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="javascript/principal.js"></script>
    <script type="module" src="javascript/paginas/cadastro-usuario.js"></script>
    <script type="module" src="javascript/modulos/alternancia-senha.js"></script>
    <script type="module" src="javascript/modulos/fechamento-modal-alerta.js"></script>
</head>
<body>
    <header class="cabecalho">
        <img src="imagens/logo.svg" alt="Logo do Rabisca">
        <h1>Rabisca</h1>
    </header>
    <nav class="menu-navegacao">
        <button type="button" title="Exibir/ocultar menu de navegação" id="botaoAlternarMenuNavegacao" class="botao-alternar-menu-navegacao">
            <i id="iconeAlternarMenuNavegacao" class="bi bi-list"></i>
        </button>
        <div id="areaLinksMenuNavegacao" class="area-links-menu-navegacao">
            <a href="index.html" class="link-menu-navegacao">
                <i class="bi bi-house"></i> Início
            </a>
            <a href="cadastro-usuario.html" class="link-menu-navegacao">
                <i class="bi bi-person-add"></i> Criar conta
            </a>
            <a href="login.html" class="link-menu-navegacao">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </a>
            <a href="sobre-desenvolvedor.html" class="link-menu-navegacao">
                <i class="bi bi-file-earmark-person"></i> Sobre o desenvolvedor
            </a>
        </div>
    </nav>
    <main>
        <h2>
            Criar conta <i class="bi bi-person-add"></i>
        </h2>
        <form id="formulario" class="formulario" novalidate>
            <label for="campoNome" class="label">
                Nome de usuário: <span class="campo-obrigatorio">*</span>
            </label>
            <input type="text" name="nome" id="campoNome" class="campo" placeholder="Digite um nome de usuário" maxlength="30" required>
            <label for="campoSenha" class="label">
                Senha: <span class="campo-obrigatorio">*</span>
            </label>
            <div class="area-campo-senha">
                <input type="password" name="senha" id="campoSenha" class="campo campo-senha" placeholder="Digite uma senha" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*\W).{8,30}$" title="A senha é obrigatória e deve conter entre 8 e 30 caracteres, incluindo uma letra minúscula, uma letra maiúscula, um número e um caractere especial." maxlength="30" required>
                <button type="button" id="botaoAlternarSenha" class="botao-alternar-senha">
                    <i id="iconeAlternarSenha" class="bi bi-eye"></i>
                </button>
            </div>
            <label for="campoPerguntaSeguranca" class="label">
                Pergunta de segurança: <span class="campo-obrigatorio">*</span>
            </label>
            <select name="pergunta_seguranca" id="campoPerguntaSeguranca" class="campo campo-pergunta-seguranca">
                <option value="">Selecione uma opção</option>
                <option value="0">Qual era o nome do seu primeiro professor?</option>
                <option value="1">Qual era o seu brinquedo favorito na infância?</option>
                <option value="2">Qual era o nome do seu primeiro animal de estimação?</option>
            </select>
            <label for="campoResposta" class="label">
                Resposta: <span class="campo-obrigatorio">*</span>
            </label>
            <input type="text" name="resposta" id="campoResposta" class="campo" placeholder="Digite uma resposta" maxlength="40" required>
            <button type="submit" class="botao-principal botao-formulario">
                Criar conta <i class="bi bi-person-add"></i>
            </button>
        </form>
        <p class="texto-alternar-formularios">
            Já tem uma conta? <a href="login.html" class="link">Entrar</a>
        </p>
    </main>
    <div class="area-acessibilidade">
        <button type="button" title="Exibir/ocultar botões de acessibilidade" id="botaoAlternarBotoesAcessibilidade" class="botao-sucesso botao-acessibilidade">
            <i class="bi bi-universal-access"></i>
        </button>
        <div id="areaBotoesAcessibilidade" class="area-botoes-acessibilidade">
            <button type="button" title="Aumentar fonte" id="botaoAumentarFonte" class="botao-sucesso botao-acessibilidade">A+</button>
            <button type="button" title="Diminuir fonte" id="botaoDiminuirFonte" class="botao-sucesso botao-acessibilidade">A-</button>
            <button type="button" title="Redefinir fonte" id="botaoRedefinirFonte" class="botao-sucesso botao-acessibilidade">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>
        </div>
    </div>
    <div id="fundoModalAlerta" class="fundo-modal"></div>
    <div id="modalAlerta" class="modal">
        <h3 class="titulo-modal">
            Aviso <i class="bi bi-exclamation-triangle"></i>
        </h3>
        <p id="textoModalAlerta" class="texto-modal"></p>
        <button type="button" id="botaoFecharModalAlerta" class="botao-perigo botao-modal botao-fechar-modal-alerta">
            Fechar <i class="bi bi-x-square"></i>
        </button>
    </div>
    <footer class="rodape">
        <p class="copyright">
            &copy; <span id="areaAnoAtual">2025</span> Rabisca | Todos os direitos reservados.
        </p>
    </footer>
</body>
</html>
