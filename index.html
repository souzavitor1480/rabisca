<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabisca | Seu bloco de notas online</title>
    <link rel="icon" href="imagens/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="estilos/principal.css">
    <link rel="stylesheet" href="estilos/botoes-principais.css">
    <link rel="stylesheet" href="estilos/containers-botoes-chamada-acao.css">
    <link rel="stylesheet" href="estilos/index.css">
    <link rel="stylesheet" href="estilos/links.css">
    <link rel="stylesheet" href="estilos/modais.css">
    <link rel="stylesheet" href="estilos/botoes-perigo.css">
    <link rel="stylesheet" href="estilos/botoes-fechar-modais-alerta.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="scripts/principal.js"></script>
    <script type="module" src="scripts/fechamento-modal-alerta.js"></script>
    <script type="module" src="scripts/exibicao-mensagem-redirecionamento.js"></script>
    <script type="module" src="scripts/encerramento-sessao.js"></script>
</head>

<body>
    <header class="cabecalho">
        <div class="container-logo">
            <img src="imagens/logo.svg" alt="Logo do Rabisca">
            <h1>Rabisca</h1>
        </div>
        <div class="container-barra-navegacao">
            <button type="button" id="botao-alternar-barra-navegacao" class="botao-alternar-barra-navegacao">
                <i id="icone-alternar-barra-navegacao" class="bi bi-list"></i>
            </button>
            <nav id="barra-navegacao" class="barra-navegacao">
                <a href="index.html" class="link-barra-navegacao">
                    <i class="bi bi-house"></i> Início
                </a>
                <a href="cadastro-usuario.html" class="link-barra-navegacao">
                    <i class="bi bi-person-add"></i> Criar conta
                </a>
                <a href="login.html" class="link-barra-navegacao">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </a>
                <a href="sobre-desenvolvedor.html" class="link-barra-navegacao">
                    <i class="bi bi-file-earmark-person"></i> Sobre o desenvolvedor
                </a>
            </nav>
        </div>
    </header>
    <main class="conteudo-principal">
        <section class="secao-introducao">
            <h2 class="titulo-secao-introducao">Suas anotações sempre ao seu alcance</h2>
            <p class="texto-secao-introducao">Anote tudo de forma simples e rápida.</p>
            <div class="container-botoes-chamada-acao">
                <a href="cadastro-usuario.html" class="botao botao-principal botao-chamada-acao">
                    Criar conta <i class="bi bi-person-add"></i>
                </a>
                <a href="login.html" class="botao botao-principal botao-chamada-acao">
                    Entrar <i class="bi bi-box-arrow-in-right"></i>
                </a>
            </div>
        </section>
        <figure class="area-imagem-destaque">
            <img src="imagens/bloco-notas.svg" alt="Ilustração de um bloco de notas" class="imagem-destaque">
            <figcaption class="legenda-imagem-destaque">
                Ilustração por <a href="https://storyset.com/work" target="_blank" class="link">Storyset</a>
            </figcaption>
        </figure>
    </main>
    <div class="ferramentas-acessibilidade">
        <button type="button" id="botao-alternar-container-botoes-acessibilidade"
            class="botao botao-sucesso botao-acessibilidade">
            <i class="bi bi-universal-access"></i>
        </button>
        <div id="container-botoes-acessibilidade" class="container-botoes-acessibilidade">
            <button type="button" id="botao-aumentar-fonte" class="botao botao-sucesso botao-acessibilidade">A+</button>
            <button type="button" id="botao-diminuir-fonte" class="botao botao-sucesso botao-acessibilidade">A-</button>
            <button type="button" id="botao-redefinir-fonte" class="botao botao-sucesso botao-acessibilidade">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>
        </div>
    </div>
    <div id="fundo-modal-alerta" class="fundo-modal"></div>
    <div id="modal-alerta" class="modal">
        <h3 class="titulo-modal">
            Atenção <i class="bi bi-exclamation-triangle"></i>
        </h3>
        <p id="texto-modal-alerta" class="texto-modal"></p>
        <button type="button" id="botao-fechar-modal-alerta"
            class="botao botao-perigo botao-modal botao-fechar-modal-alerta">
            Fechar <i class="bi bi-x-square"></i>
        </button>
    </div>
    <footer class="rodape">
        <p class="creditos">
            <i class="bi bi-c-circle"></i>
            <span id="container-ano-atual">2025</span> Rabisca - Todos os direitos reservados.
        </p>
    </footer>
</body>

</html>
