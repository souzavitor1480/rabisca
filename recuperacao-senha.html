<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabisca | Recuperar senha</title>
    <link rel="icon" href="imagens/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="estilos/principal.css">
    <link rel="stylesheet" href="estilos/conteudos-principais.css">
    <link rel="stylesheet" href="estilos/formularios.css">
    <link rel="stylesheet" href="estilos/containers-campos-senha.css">
    <link rel="stylesheet" href="estilos/campos-pergunta-seguranca.css">
    <link rel="stylesheet" href="estilos/container-botoes-formularios.css">
    <link rel="stylesheet" href="estilos/modais.css">
    <link rel="stylesheet" href="estilos/botoes-fechar-modais-alerta.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="scripts/principal.js"></script>
    <script type="module" src="scripts/fechamento-modal-alerta.js"></script>
    <script type="module" src="scripts/encerramento-sessao.js"></script>
    <script type="module" src="scripts/alternancia-senha.js"></script>
    <script type="module" src="scripts/recuperacao-senha.js"></script>
</head>

<body>
    <header class="cabecalho">
        <div class="container-logo">
            <img src="imagens/logo.svg" alt="Logo do Rabisca" class="imagem-logo">
            <h1 class="texto-logo">Rabisca</h1>
        </div>
        <div class="container-barra-navegacao">
            <button type="button" id="botao-alternar-barra-navegacao" class="botao-alternar-barra-navegacao">
                <i id="icone-alternar-barra-navegacao" class="bi bi-list"></i>
            </button>
            <nav id="barra-navegacao" class="barra-navegacao">
                <a href="index.html" class="link-barra-navegacao">
                    <i class="bi bi-house"></i> Início
                </a>
                <a href="cadastro-usuario.html" class="link-barra-navegacao">
                    <i class="bi bi-person-add"></i> Criar conta
                </a>
                <a href="login.html" class="link-barra-navegacao">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </a>
                <a href="sobre-desenvolvedor.html" class="link-barra-navegacao">
                    <i class="bi bi-file-earmark-person"></i> Sobre o desenvolvedor
                </a>
            </nav>
        </div>
    </header>
    <main class="conteudo-principal">
        <h2 class="titulo-conteudo-principal">
            Recuperar senha <i class="bi bi-unlock"></i>
        </h2>
        <form id="formulario" class="formulario" novalidate>
            <label for="campo-nome" class="label">
                Nome de usuário: <span class="obrigatorio">*</span>
            </label>
            <input type="text" name="nome" id="campo-nome" class="campo" placeholder="Digite seu nome de usuário"
                maxlength="30" required>
            <label for="campo-senha" class="label">
                Nova senha: <span class="obrigatorio">*</span>
            </label>
            <div class="container-campo-senha">
                <input type="password" name="senha" id="campo-senha" class="campo campo-senha"
                    placeholder="Digite uma nova senha" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*\W).{8,30}$"
                    title="A senha é obrigatória e deve conter entre 8 e 30 caracteres, incluindo uma letra minúscula, uma letra maiúscula, um número e um caractere especial."
                    maxlength="30" required>
                <button type="button" id="botao-alternar-senha" class="botao-alternar-senha">
                    <i id="icone-alternar-senha" class="bi bi-eye"></i>
                </button>
            </div>
            <label for="pergunta-seguranca" class="label">
                Pergunta de segurança: <span class="obrigatorio">*</span>
            </label>
            <select name="pergunta-seguranca" id="pergunta-seguranca" class="campo campo-pergunta-seguranca" required>
                <option value="">Selecione uma opção</option>
                <option value="0">Qual era o nome do seu primeiro animal de estimação?</option>
                <option value="1">Qual era o nome do seu primeiro professor?</option>
                <option value="2">Qual era o nome do seu brinquedo favorito na infância?</option>
            </select>
            <label for="resposta" class="label">
                Resposta: <span class="obrigatorio">*</span>
            </label>
            <input type="text" name="resposta" id="resposta" class="campo" placeholder="Digite sua resposta"
                maxlength="40" required>
            <div class="container-botoes-formulario">
                <button type="submit" class="botao-enviar-formulario">
                    Recuperar senha <i class="bi bi-unlock"></i>
                </button>
                <a href="login.html" class="botao-voltar">
                    Voltar <i class="bi bi-arrow-left-square"></i>
                </a>
            </div>
        </form>
    </main>
    <div class="ferramentas-acessibilidade">
        <button type="button" id="botao-alternar-container-botoes-acessibilidade" class="botao-acessibilidade">
            <i class="bi bi-universal-access"></i>
        </button>
        <div id="container-botoes-acessibilidade" class="container-botoes-acessibilidade">
            <button type="button" id="botao-aumentar-fonte" class="botao-acessibilidade">A+</button>
            <button type="button" id="botao-diminuir-fonte" class="botao-acessibilidade">A-</button>
            <button type="button" id="botao-redefinir-fonte" class="botao-acessibilidade">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>
        </div>
    </div>
    <div id="fundo-modal-alerta" class="fundo-modal"></div>
    <div id="modal-alerta" class="modal">
        <h3 class="titulo-modal">
            Atenção <i class="bi bi-exclamation-triangle"></i>
        </h3>
        <p id="texto-modal-alerta" class="texto-modal"></p>
        <button type="button" id="botao-fechar-modal-alerta" class="botao-modal botao-fechar-modal-alerta">
            Fechar <i class="bi bi-x-square"></i>
        </button>
    </div>
    <footer class="rodape">
        <p class="creditos">
            <i class="bi bi-c-circle"></i>
            <span id="container-ano-atual">2025</span> Rabisca - Todos os direitos reservados.
        </p>
    </footer>
</body>

</html>
